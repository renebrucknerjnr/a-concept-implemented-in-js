var GLOBAL_SPEED_VARIABLE_FOR_FFT_EPICYCLES = 100;

function floor(n) {
	return Math.floor(n);
}

function fract(n) {
	return n - floor(n);
}

function mod(n, m) {
	return fract(n / m) * m;
}

function rgbToHex(r, g, b) {
    r = floor(r); g = floor(g); b = floor(b);
    r = r.toString(16);
    g = g.toString(16);
    b = b.toString(16);
    return ("0".repeat(2-r.length)+r) + ("0".repeat(2-g.length)+g) + ("0".repeat(2-b.length)+b);
}

function lerp(a, b, t) {
    return a*(1-t) + b*t;
}

function drawCatmullRomBezier(ctx, points) {
    if (points.length < 4) return;

    ctx.beginPath();
    ctx.moveTo(points[1].x, points[1].y);

    for (let i = 0; i < points.length - 3; i++) {
        const p0 = points[i];
        const p1 = points[i + 1];
        const p2 = points[i + 2];
        const p3 = points[i + 3];

        const cp1 = {
            x: p1.x + (p2.x - p0.x) / 6,
            y: p1.y + (p2.y - p0.y) / 6
        };

        const cp2 = {
            x: p2.x - (p3.x - p1.x) / 6,
            y: p2.y - (p3.y - p1.y) / 6
        };

        ctx.bezierCurveTo(
            cp1.x, cp1.y,
            cp2.x, cp2.y,
            p2.x, p2.y
        );
    }

    ctx.stroke();
}

function hash12(a, b = 10) { // https://www.shadertoy.com/view/WXSBDV
	let x = a * 256.8 + 0.2;
	let y = b * 256.8 + 0.2;
	let z = x;

	x = fract(x * 0.1031);
	y = fract(y * 0.1031);
	z = fract(z * 0.1031);

	x += x * (y + 33.33);
	y += y * (z + 33.33);
	z += z * (x + 33.33);

	return fract((x + y) * z);
	/* ((fract(x * 0.1031) + fract(x * 0.1031) * (fract(y * 0.1031) + 33.33)) + (fract(y * 0.1031) + fract(y * 0.1031) * (fract(x * 0.1031) + 33.33))) * (fract(x * 0.1031) + fract(x * 0.1031) * (fract(x * 0.1031) + 33.33))
 	 =
 	fract(x * 0.1031)*(fract(x * 0.1031)+34.33) * ((2*fract(y * 0.1031) + 34.33)*fract(x * 0.1031) + 34.33*fract(y * 0.1031)) */
}

function circumCircle(p1,p2,p3) {
	// https://www.desmos.com/calculator/okei9kr8yi

	// delta x and y
	let dx1 = p1.x - p2.x;
	let dy1 = p1.y - p2.y;

	let dx2 = p2.x - p3.x;
	let dy2 = p2.y - p3.y;

	let dx3 = p3.x - p1.x;
	let dy3 = p3.y - p1.y;

	// triangle sides
	let l1 = Math.sqrt(dx1*dx1 + dy1*dy1);
	let l2 = Math.sqrt(dx2*dx2 + dy2*dy2);
	let l3 = Math.sqrt(dx3*dx3 + dy3*dy3);

	let s = (l1 + l2 + l3) / 2;

	// triangle area
	let a = Math.sqrt(s * (s - l1) * (s - l2) * (s - l3));

	// cirlce radius
	let r = (l1 * l2 * l3) / (4 * a);

	// angles between vertices
	// let a1 = Math.atan2(dy1, dx1);

	// midpoints of sides
	// let m1 = {x: p1.x - l1 / 2 * Math.cos(a1), y: p1.y - l1 / 2 * Math.sin(a1)};
	let m1 = {x: p1.x - l1 * (dx1 / l1) / 2, y: p1.y - l1 * (dy1 / l1) / 2}; // normalized dx and dy
	let m2 = {x: p2.x - l2 * (dx2 / l2) / 2, y: p2.y - l2 * (dy2 / l2) / 2};
	let m3 = {x: p3.x - l3 * (dx3 / l3) / 2, y: p3.y - l3 * (dy3 / l3) / 2};

	// perpendicular angles
	// let piOverTwo = Math.PI / 2;
	// let TAU = Math.PI * 2;
	// let a12 = mod(a1 + piOverTwo, TAU);

	// slope and y-intercept (y = mx + b)
	/*	
		s1 = Math.tan(a12)
		s1 = Math.tan(mod(Math.atan2(p1.y - p2.y, p1.x - p2.x) + piOverTwo, TAU))

		theta = Math.atan2(dy, dx)
		s1 = Math.tan(theta + piOverTwo)
		becomes: (-dx / dy)
			because: cos(theta) = dx / r
					 sin(theta) = dy / r

					 [tan(t) = sin(t)/cos(t)]
					 [tan(t + 90deg) = cos(t)/sin(t)]

			so:  -(cos(theta) / sin(theta)) = -((dx / r) / (dy / r)) = -(dx / dy)

		therefore:
			s1 = -(p1.x - p2.x) / (p1.y - p2.y)
			s1 = (p2.x - p1.x) / (p1.y - p2.y)

	*/
	let s1 = -dx1 / dy1; // slope
	let s2 = -dx2 / dy2;
	let s3 = -dx3 / dy3;

	let b1 = m1.y - s1 * m1.x; // intercept
	let b2 = m2.y - s2 * m2.x;
	let b3 = m3.y - s3 * m3.x;

	// Solving for x and then y with three equations (y=mx+b)
	let cx = (b2 - b1) / (s1 - s2);
	let cy = s3 * cx + b3
	return {x: cx, y: cy, r: r};
}

function hashArrayToNumber(arr) {
  // 1. Serialize the array to a consistent string format
  const str = JSON.stringify(arr);
  
  // 2. Initialize FNV-1a 32-bit offset basis
  let hash = 2166136261;
  
  for (let i = 0; i < str.length; i++) {
    // XOR the bottom with the current character
    hash ^= str.charCodeAt(i);
    // Multiply by the 32-bit FNV prime
    hash = Math.imul(hash, 16777619);
  }
  
  // Return as an unsigned 32-bit integer
  return hash >>> 0;
}


class Point {
	constructor(x,y) {
		this.x = x;
		this.y = y;
	}

	equals(p) {
		return (this.x == p.x && this.y == p.y);
	}
}

class Segment {
	constructor(p1, p2) {
		this.p1 = p1;
		this.p2 = p2;
		this.length = -1;
		this.computeLength();
	}

	computeLength() {
		let dx = this.p1.x - this.p2.x;
		let dy = this.p1.y - this.p2.y;
		this.length = Math.sqrt(dx * dx + dy * dy);
	}

	equals(s) { // direction doesn't matter (for now)
		return ((this.p1.equals(s.p1) && this.p2.equals(s.p2)) || (this.p1.equals(s.p2) && this.p2.equals(s.p1)));
	}

	intersect(seg2) {
		// https://www.desmos.com/calculator/l7csvkyy6v

		let W = (this.p1.x - this.p2.x) * (seg2.p1.y - seg2.p2.y) - (this.p1.y - this.p2.y) * (seg2.p1.x - seg2.p2.x);

		let Wt = (this.p1.x - seg2.p1.x) * (seg2.p1.y - seg2.p2.y) - (this.p1.y - seg2.p1.y) * (seg2.p1.x - seg2.p2.x);

		let Wu = (this.p1.x - seg2.p1.x) * (this.p1.y - this.p2.y) - (this.p1.y - seg2.p1.y) * (this.p1.x - this.p2.x);

		if (W == 0) return [false, 0, 0];
		let t = Wt/W;
		let u = Wu/W;

		let Ix = this.p1.x + t * (this.p2.x - this.p1.x);
		let Iy = this.p1.y + t * (this.p2.y - this.p1.y);
		let hit = (W == 0 ? false : (u < 0 ? false : (u > 1 ? false : (t < 0 ? false : (t > 1 ? false : true)))));
		return {hit: hit, x: Ix, y: Iy, t: t, u: u};
	}

	hasPoint(p) {
		if (this.p1.equals(p) || this.p2.equals(p)) {
			return true;
		} else {
			return false;
		}
	}
}

function pointKey(p) {
    return `${p.x},${p.y}`;
}

function segmentsToTrianglePoints(s1, s2, s3) { // assuming they make a valid triangle
	const segments = [s1, s2, s3];

    // Collect unique points
    const points = new Map();

    for (const s of segments) {
        points.set(pointKey(s.p1), s.p1);
        points.set(pointKey(s.p2), s.p2);
    }

    return [...points.values()];
}

function segmentsFormTriangle(s1, s2, s3) {
    const segments = [s1, s2, s3];

    // Collect unique points
    const points = new Map();

    for (const s of segments) {
        points.set(pointKey(s.p1), s.p1);
        points.set(pointKey(s.p2), s.p2);
    }

    // A triangle must have exactly 3 unique vertices
    if (points.size !== 3) {
        return false;
    }

    // Count how many segment endpoints touch each vertex
    const degree = {};

    for (const key of points.keys()) {
        degree[key] = 0;
    }

    for (const s of segments) {
        degree[pointKey(s.p1)]++;
        degree[pointKey(s.p2)]++;
    }

    // Every vertex must belong to exactly 2 segments
    if (!Object.values(degree).every(d => d === 2)) {
        return false;
    }

    // Check that the three points are not collinear
    const [A, B, C] = [...points.values()];

    const area2 =
        (B.x - A.x) * (C.y - A.y) -
        (B.y - A.y) * (C.x - A.x);

    return area2 !== 0;
}

function pointsFormTriangle(p1, p2, p3) {
	let s1 = new Segment(p1, p2);
	let s2 = new Segment(p2, p3);
	let s3 = new Segment(p3, p1);
	return segmentsFormTriangle(s1, s2, s3);
}

function trianglesToUniqueSegments(tris) {
	const segments = [];

    for (const tri of tris) {
        for (const seg of tri.getSegments()) {
            if (!segments.some(s => s.equals(seg))) {
                segments.push(seg);
            }
        }
    }

    return segments;
}

class Triangle {
	constructor(p1,p2,p3) {
		this.p1 = p1;
		this.p2 = p2;
		this.p3 = p3;
	}

	getSegments() {
		return [
			new Segment(this.p1, this.p2),
			new Segment(this.p2, this.p3),
			new Segment(this.p3, this.p1)
		];
	}

	getPoints() {
		return [this.p1, this.p2, this.p3];
	}

	hasPoint(p) {
		if (this.p1.x == p.x && this.p1.y == p.y) {
			return true;
		} else if (this.p2.x == p.x && this.p2.y == p.y) {
			return true;
		} else if (this.p3.x == p.x && this.p3.y == p.y) {
			return true;
		} else {
			return false
		}
	}

	pointInCirc(p) { // or on edge
		let a = this.p1;
		let b = this.p2;
		let c = this.p3;
		let d = p;

		// translated to center at (0,0)
		const ax = a.x - d.x;
	    const ay = a.y - d.y;
	    const bx = b.x - d.x;
	    const by = b.y - d.y;
	    const cx = c.x - d.x;
	    const cy = c.y - d.y;
		const det =
        (ax * ax + ay * ay) * (bx * cy - by * cx) -
        (bx * bx + by * by) * (ax * cy - ay * cx) +
        (cx * cx + cy * cy) * (ax * by - ay * bx);

		const orient =
		    (b.x - a.x) * (c.y - a.y) -
		    (b.y - a.y) * (c.x - a.x);

		if (orient == 0) return false;
		const EPS = 1e-12; // accounting for floating point imprecision
		return (orient > 0) ? (det >= -EPS) : (det <= +EPS);
	}

	pointInTriangle(p) {
		let det = (this.p2.y - this.p3.y) * (this.p1.x - this.p3.x) + (this.p3.x - this.p2.x) * (this.p1.y - this.p3.y);
		if (det == 0) return false; // or true, idk just avoid error
		
		let u = (this.p2.y - this.p3.y) * (p.x - this.p3.x) + (this.p3.x - this.p2.x) * (p.y - this.p3.y);
		u = u / det;
		
		let v = (this.p3.y - this.p1.y) * (p.x - this.p3.x) + (this.p1.x - this.p3.x) * (p.y - this.p3.y);
		v = v / det;

		let w = 1 - u - v;

		return (u >= 0 && v >= 0 && w >= 0);
	}
}

function bowyer_watson_SUPERTRIANGLE(pl, M = 10) {
	let x_min = 1000000;
	let y_min = 1000000;
	let x_max = -1000000;
	let y_max = -1000000;

	for (let i = 0; i < pl.length; i++) {
		if (x_min > pl[i].x) x_min = pl[i].x;
		if (y_min > pl[i].y) y_min = pl[i].y;
		if (x_max < pl[i].x) x_max = pl[i].x;
		if (y_max < pl[i].y) y_max = pl[i].y;
	}

	let dx = x_max - x_min;
	let dy = y_max - y_min;
	let d_max = (dx > dy ? dx : dy);

	let x_mid = (x_max + x_min) * 0.5;
	let y_mid = (y_max + y_min) * 0.5;

	let v1_x = x_mid;
	let v1_y = y_max + M*d_max;

	let v2_x = x_min - M*d_max;
	let v2_y = y_min - M*d_max;

	let v3_x = x_max + M*d_max;
	let v3_y = y_min - M*d_max;

	return new Triangle(new Point(v1_x, v1_y), new Point(v2_x, v2_y), new Point(v3_x, v3_y));
}

function addBoundaryEdge(boundary, edge) {
    const index = boundary.findIndex(e => e.equals(edge));

    if (index === -1) {
        boundary.push(edge);
    } else {
        // Shared by two triangles, so remove it.
        boundary.splice(index, 1);
    }
}

// Delaunay triangulation Bowyer–Watson
function bowyer_watson(pl) { // [{x:0,y:0}] / [Point()]
	// 1. Start with a large "super triangle."
	let superTriangle = bowyer_watson_SUPERTRIANGLE(pl);
	let tris = [superTriangle]; // list of triangles

	for (let i = 0; i < pl.length; i++) {
		let pt = pl[i]; // point_temp

		// Remove every triangle whose circumcircle contains the new point.
		let temp_tris = [];
		let removedSegments = [];
		for (let j = 0; j < tris.length; j++) {
			if (!tris[j].pointInCirc(pt)) { // check if current point is in the current triangle's circumcircle (CmC)
				temp_tris.push(tris[j]);

			} else {
				let [temp_s1, temp_s2, temp_s3] = tris[j].getSegments();
				addBoundaryEdge(removedSegments, temp_s1);
				addBoundaryEdge(removedSegments, temp_s2);
				addBoundaryEdge(removedSegments, temp_s3);
			}
		}
		
		tris = temp_tris; // triangle list without the triangles that have the point in their CmC

		// The boundary of the removed region forms a polygon.
		// Connect the new point to each boundary edge.
		for (let j = 0; j < removedSegments.length; j++) {
			tris.push(new Triangle(removedSegments[j].p1, removedSegments[j].p2, pt));	
		}
	}

	// Remove triangles connected to the super triangle at the end.
	let temp_tris = [];
	let pl1 = superTriangle.getPoints();
	for (let i = 0; i < tris.length; i++) {

		let pl2 = tris[i].getPoints();
		let keepBool = true;
		for (const p1 of pl1) {
			for (const p2 of pl2) {
				if (p1.equals(p2)) {
					keepBool = false;
					break;
				}
			}
			if (!keepBool) break;
		}
		if (keepBool) temp_tris.push(tris[i]); // nothing changed
	}
	tris = temp_tris; // triangle list without the triangles that have the point in their CmC

	return tris;
} // return array of Triangles


// RADIX-2 FFT
function transform(real, imag, inverse = false) {
    const N = real.length;

    if ((N & (N - 1)) !== 0) {
        throw new Error("Length must be a power of 2");
    }

    // Bit-reversal permutation
    let j = 0;
    for (let i = 1; i < N; i++) {
        let bit = N >> 1;
        while (j & bit) {
            j ^= bit;
            bit >>= 1;
        }
        j ^= bit;

        if (i < j) {
            [real[i], real[j]] = [real[j], real[i]];
            [imag[i], imag[j]] = [imag[j], imag[i]];
        }
    }

    // FFT / IFFT
    for (let len = 2; len <= N; len <<= 1) {
        const half = len >> 1;
        const ang = (inverse ? 2 : -2) * Math.PI / len;

        const wlen_r = Math.cos(ang);
        const wlen_i = Math.sin(ang);

        for (let i = 0; i < N; i += len) {
            let w_r = 1;
            let w_i = 0;

            for (let j = 0; j < half; j++) {
                const even = i + j;
                const odd = even + half;

                const u_r = real[even];
                const u_i = imag[even];

                const t_r = real[odd] * w_r - imag[odd] * w_i;
                const t_i = real[odd] * w_i + imag[odd] * w_r;

                real[even] = u_r + t_r;
                imag[even] = u_i + t_i;

                real[odd] = u_r - t_r;
                imag[odd] = u_i - t_i;

                const next_w_r = w_r * wlen_r - w_i * wlen_i;
                w_i = w_r * wlen_i + w_i * wlen_r;
                w_r = next_w_r;
            }
        }
    }

    // Normalize only for IFFT
    if (inverse) {
        for (let i = 0; i < N; i++) {
            real[i] /= N;
            imag[i] /= N;
        }
    }
}

function bluesteinFFT(real, imag) { // way to give n-length data to radix-2
    const N = real.length;

    // Find convolution size (next power of two)
    let M = 1;
    while (M < 2 * N - 1) {
        M <<= 1;
    }

    // Chirp arrays
    const ar = new Array(M).fill(0);
    const ai = new Array(M).fill(0);

    const br = new Array(M).fill(0);
    const bi = new Array(M).fill(0);

    for (let k = 0; k < N; k++) {
        const angle = Math.PI * k * k / N;

        const cos = Math.cos(angle);
        const sin = Math.sin(angle);

        // x[k] * exp(-i*pi*k^2/N)
        ar[k] = real[k] * cos + imag[k] * sin;
        ai[k] = imag[k] * cos - real[k] * sin;

        // exp(+i*pi*k^2/N)
        br[k] = cos;
        bi[k] = sin;

        if (k !== 0) {
            br[M - k] = cos;
            bi[M - k] = sin;
        }
    }


    // FFT(a)
    transform(ar, ai, false);

    // FFT(b)
    transform(br, bi, false);


    // Multiply in frequency domain
    for (let i = 0; i < M; i++) {
        const r = ar[i] * br[i] - ai[i] * bi[i];
        const im = ar[i] * bi[i] + ai[i] * br[i];

        ar[i] = r;
        ai[i] = im;
    }


    // Inverse FFT
    transform(ar, ai, true);


    // Final chirp multiplication
    const outR = new Array(N);
    const outI = new Array(N);

    for (let k = 0; k < N; k++) {

        const angle = Math.PI * k * k / N;

        const cos = Math.cos(angle);
        const sin = Math.sin(angle);

        outR[k] =
            ar[k] * cos +
            ai[k] * sin;

        outI[k] =
            ai[k] * cos -
            ar[k] * sin;
    }


    return {
        real: outR,
        imag: outI
    };
}

function bluesteinIFFT(real, imag) {
    const N = real.length;

    // conjugate
    for (let i = 0; i < N; i++) {
        imag[i] = -imag[i];
    }

    const result = bluesteinFFT(real, imag);

    // conjugate and scale
    for (let i = 0; i < N; i++) {
        real[i] = result.real[i] / N;
        imag[i] = -result.imag[i] / N;
    }
}

function fft(real, imag) {
	/*
	after fft, this is the frequency component:
 		real[k] + i*imag[k]
	amplitude:
 		const amplitude = Math.sqrt(real[k] * real[k] + imag[k] * imag[k]);
	phase:
		const phase = Math.atan2(imag[k], real[k]);
	-----------------------------------------------
		const frequencies = real.map((r, i) => ({
		    index: i,
		    magnitude: Math.sqrt(
		        r*r + imag[i]*imag[i]
		    ),
		    r,
		    i: imag[i]
		}));
	*/
    return bluesteinFFT(real, imag);
}

	        phase: Math.atan2(im, r)
	    });
	}

	coeffs.sort((a, b) => b.amp - a.amp);
	const used = coeffs.slice(0, 50);

	radius: c.amp
	angle: 2PI * t * c.freq + c.phase
	x: radius * cos(angle)
	y: radius * sin(angle)
	*/
    return bluesteinIFFT(real, imag);
}

function getFrequency(k, N) {
	/*
	FFT outputs frequencies like:
		0,1,2,3,...,N-1
	but the upper half represents negative frequencies:
		0,1,2,3,...,N/2,-N/2+1,...,-3,-2,-1
	*/
    return k <= N/2 ? k : k - N;
}

function drawEpicycles(t, coeffs, mean, ctx, base = new Point(0,0)) {
	/*
		Drawing from the base instead of the mean (center of point) was hard, until it wasn't.

		I tried using AI instead of doing the work myself, and it couldn't figure it out (and that meant "I couldn't figure it out"). Moral of the story: Do it yourself, then use AI to bugfix and check your work. But, really, just do it yourself.
	*/
    let x = base.x;
    let y = base.y;

    ctx.fillStyle = "#5D5";
    ctx.lineWidth = 3;
    ctx.fillRect(base.x - 5, base.y - 5, 10, 10);

    for (const c of coeffs) {

        const prevX = x;
        const prevY = y;

        const radius = c.amp;
        const angle =
            2 * Math.PI * c.freq * t +
            c.phase;

        x += radius * Math.cos(angle);
        y += radius * Math.sin(angle);


        // draw circle
        ctx.strokeStyle = "#555";
        ctx.beginPath();
        ctx.arc(
            prevX,
            prevY,
            radius,
            0,
            Math.PI * 2
        );
        ctx.stroke();


        // draw arm
        ctx.strokeStyle = "#999";
        ctx.beginPath();
        ctx.moveTo(prevX, prevY);
        ctx.lineTo(x, y);
        ctx.stroke();
    }

    return new Point(x, y);
}


/**
 * Calculates the perpendicular squared distance from a point to a line segment.
 */
function getSquareSegmentDistance(p, p1, p2) {
    let x = p1.x;
    let y = p1.y;
    let dx = p2.x - x;
    let dy = p2.y - y;

    if (dx !== 0 || dy !== 0) {
        const t = ((p.x - x) * dx + (p.y - y) * dy) / (dx * dx + dy * dy);

        if (t > 1) {
            x = p2.x;
            y = p2.y;
        } else if (t > 0) {
            x += dx * t;
            y += dy * t;
        }
    }

    dx = p.x - x;
    dy = p.y - y;

    return dx * dx + dy * dy;
}

/**
 * Simplifies a polyline using the Ramer-Douglas-Peucker algorithm.
 * @param {Array<Point>} points - Array of points.
 * @param {number} epsilon - Distance threshold for simplification.
 * @returns {Array<Point>} Simplified array of points.
 */
function simplifyRDP(points, epsilon) {
    if (points.length <= 2) return points;

    const sqEpsilon = epsilon * epsilon;
    const lastIdx = points.length - 1;
    let maxSqDist = 0;
    let index = 0;

    // Find the point with the maximum distance
    for (let i = 1; i < lastIdx; i++) {
        const sqDist = getSquareSegmentDistance(points[i], points[0], points[lastIdx]);
        if (sqDist > maxSqDist) {
            index = i;
            maxSqDist = sqDist;
        }
    }

    // If max distance is greater than epsilon, recursively simplify
    if (maxSqDist > sqEpsilon) {
        const results1 = simplifyRDP(points.slice(0, index + 1), epsilon);
        const results2 = simplifyRDP(points.slice(index), epsilon);

        // Concatenate results, dropping the duplicate middle point
        return results1.slice(0, results1.length - 1).concat(results2);
    }

    // Otherwise, return the endpoints
    return [points[0], points[lastIdx]];
}

function resampleToEqualSpacing(points, spacing) {
	let n = points.length - 1;
	let n2 = 10*n;
	let n3 = 1 / n2;

	let res = [points[0]];

	for (let j = 0; j < n; j+=n3) {
		let i = parseInt(floor(j));
		let l = fract(j);

		let x = lerp(points[i].x, points[i+1].x, l);
		let y = lerp(points[i].y, points[i+1].y, l);
		let d = Math.sqrt((res[res.length-1].x - x)**2 + (res[res.length-1].y - y)**2);

		if (d >= spacing) {
			res.push(new Point(x, y));
		}
	}
	return res;
}

class Stroke {
	constructor() {
		this.raw = [];
		this.simple = [];
		this.resampled = [];
		
		this.coeffs = [];
		this.used = [];
		this.traced = [];
		this.mean = null;
		this.ftRes = [];
		this.triangleSegments = [];
	}

	async process(penBase = new Point(0,0)) {
		// this.raw.push(this.raw[0]); // copy the first point to the end for fft

		// simplify the drawn points
		this.simple = await simplifyRDP(this.raw, 5);
		this.simple.push(this.simple[0]); // copy the first point to the end for fft

		// resample so that they're equaly spaced
		this.resampled = await resampleToEqualSpacing(this.simple, 20);

		// Discrete/Fast Fourier Transform
		let cx = 0;
		let cy = 0;

		for (let pi = 0; pi < this.resampled.length; pi++) {
		    cx += this.resampled[pi].x; // race conditions
		    cy += this.resampled[pi].y;
		}

		cx /= this.resampled.length;
		cy /= this.resampled.length;
		this.mean = new Point(cx, cy);

		// const real = this.resampled.map(p => p.x - cx);
		// const imag = this.resampled.map(p => p.y - cy);
		const real = this.resampled.map(p => p.x - penBase.x);
		const imag = this.resampled.map(p => p.y - penBase.y);

		this.ftRes = fft(real, imag);

		this.coeffs = [];

		const invN = 1 / this.ftRes.real.length;
		for (let i = 0; i < this.ftRes.real.length; i++) {
		    const r = this.ftRes.real[i] * invN;
		    const im = this.ftRes.imag[i] * invN;

		    this.coeffs.push({
		        re: r,
		        im: im,
		        freq: getFrequency(i, this.ftRes.real.length),
		        amp: Math.hypot(r, im),
		        phase: Math.atan2(im, r)
		    });
		}
		this.coeffs.sort((a, b) => b.amp - a.amp); // sort according to amplitude
		this.used = this.coeffs.slice(0, 50);

		// this.used = this.used.toSorted((a, b) => a.freq - b.freq).slice(0, 50); // sort according to frequency
		// this.used = this.coeffs;

		this.traced = [];
		let sampleCount = this.resampled.length; // s=(2f+1)
		let maxFrequency = (sampleCount-1)*0.5; // (s-1)*0.5=f
		const tIncrement = 1 / sampleCount;

		for (let n = 0; n < sampleCount; n++) {
			const t = n * tIncrement;

			let x = penBase.x;
			let y = penBase.y;
			for (const c of this.used) {
				const angle = 2 * Math.PI * c.freq * t + c.phase;
				x += c.amp * Math.cos(angle);
				y += c.amp * Math.sin(angle); // - if drawing is upside down, otherwise keep +
		    }

	        // x += cx;
	        // y += cy;
	        // x += penBase.x;
	        // y += penBase.y;
			this.traced.push(new Point(x, y));
		}

		this.triangleSegments = trianglesToUniqueSegments(bowyer_watson(this.traced))
	}
}

class GameArea {
	constructor() {
		this.canvas = document.createElement("canvas");
		this.resizeCanvasFunction = this.resizeCanvasFunction.bind(this); // or wrap the callback (on resize) in an arrow function
	}

	resizeCanvasFunction() {
		// 16:9
		if (window.innerWidth >= window.innerHeight) {
			this.canvas.width = 2048; // 2**11
			this.canvas.height = 1152; // 2**10+2**7
		} else {
			this.canvas.width = 1152;
			this.canvas.height = 2048;
		}
		if (this.ctx != null) {
			this.ctx.width = this.canvas.width;
			this.ctx.height = this.canvas.height;
		}

		let canvasAspect = this.canvas.width / this.canvas.height;
		let viewPortAspect = window.innerWidth / window.innerHeight;

		if (viewPortAspect > canvasAspect) {
			this.canvas.style.width = "auto";
			this.canvas.style.height = "100vh";

			let w = window.innerHeight * canvasAspect;
			let w2 = Math.max(0, (document.documentElement.clientWidth - w)*0.5);
			this.canvas.style.margin = "0px";
			this.canvas.style.marginLeft = `${w2}px`;
			this.canvas.style.marginRight = `${w2}px`;
		} else {
			this.canvas.style.width = "100vw";
			this.canvas.style.height = "auto";

			let h = window.innerWidth / canvasAspect;
			let h2 = Math.max(0, (document.documentElement.clientHeight - h)*0.5);
			this.canvas.style.margin = "0px";
			this.canvas.style.marginTop = `${h2}px`;
			this.canvas.style.marginBottom = `${h2}px`;
		}
	}

	start() {
		this.canvas.style.background = "#222";
		this.canvas.style.padding = "0px";
		this.canvas.style.margin = "0px";

		this.resizeCanvasFunction();
		window.addEventListener("resize", this.resizeCanvasFunction);

		if (document.body.childNodes.length >= 1) { // make sure the canvas is the first thing you see
			document.body.insertBefore(this.canvas, document.body.childNodes[0]);
		} else {
			document.body.appendChild(this.canvas);
		}

		this.ctx = this.canvas.getContext("2d");
		this.ctx.width = this.canvas.width;
		this.ctx.height = this.canvas.height;
	}
}

class InputManager {
    constructor() {
        this.keysDown = new Set();
        this.keysPressed = new Set();
        this.keysReleased = new Set();

        this.mouse = {
            x: 0,
            y: 0,
            mx: 0,
            my: 0,
            buttonsDown: new Set(),
            buttonsPressed: new Set(),
            buttonsReleased: new Set()
        };

        this.touches = new Map(); // active touches
		this.touchPressed = new Set();
		this.touchReleased = new Set();
        
        this.lastTouchReleaseXY = {x: -1, y: -1};
        this.lastMouseReleaseXY = {x: -1, y: -1};

		this.swipe = {
		    active: false,
		    startX: 0,
		    startY: 0,
		    x: 0,
		    y: 0
		};

        this._bindEvents();
    }

    _bindEvents() {
        // Keyboard
        window.addEventListener("keydown", (e) => {
            if (!this.keysDown.has(e.code)) {
                this.keysPressed.add(e.code);
            }
            this.keysDown.add(e.code);
        });

        window.addEventListener("keyup", (e) => {
            this.keysDown.delete(e.code);
            this.keysReleased.add(e.code);
        });

        // Mouse move
        window.addEventListener("mousemove", (e) => {
            this.mouse.x = e.clientX;
            this.mouse.y = e.clientY;

            this.swipe.x = e.clientX;
		    this.swipe.y = e.clientY;
        });

        // Mouse down
        window.addEventListener("mousedown", (e) => {
            if (!this.mouse.buttonsDown.has(e.button)) {
                this.mouse.buttonsPressed.add(e.button);
            }
            this.mouse.buttonsDown.add(e.button);

            if (!this.swipe.active) {
	            this.swipe.active = true;
	            this.swipe.startX = e.clientX;
	            this.swipe.startY = e.clientY;
	        }
        });

        // Mouse up
        window.addEventListener("mouseup", (e) => {
            this.mouse.buttonsDown.delete(e.button);
            this.mouse.buttonsReleased.add(e.button);
            this.lastMouseReleaseXY.x = e.clientX;
            this.lastMouseReleaseXY.y = e.clientY;

            this.swipe.active = false;
        });

        // TOUCH START
		window.addEventListener("touchstart", (e) => {
		    for (const t of e.changedTouches) {
		        this.touches.set(t.identifier, {
		            x: t.clientX,
		            y: t.clientY
		        });

		        this.touchPressed.add(t.identifier);

		        // swipe start (first finger only)
		        if (!this.swipe.active) {
		            this.swipe.active = true;
		            this.swipe.startX = t.clientX;
		            this.swipe.startY = t.clientY;
		        }
		    }
		});

		// TOUCH MOVE
		window.addEventListener("touchmove", (e) => {
		    for (const t of e.changedTouches) {
		        if (this.touches.has(t.identifier)) {
		            this.touches.set(t.identifier, {
		                x: t.clientX,
		                y: t.clientY
		            });

		            this.swipe.x = t.clientX;
		            this.swipe.y = t.clientY;
		        }
		    }
		});

		// TOUCH END
		window.addEventListener("touchend", (e) => {
		    for (const t of e.changedTouches) {
		        this.touches.delete(t.identifier);
		        this.touchReleased.add(t.identifier);
                this.lastTouchReleaseXY.x = t.clientX;
                this.lastTouchReleaseXY.y = t.clientY;
                // console.log(t)
		    }

		    if (this.touches.size === 0) {
		        this.swipe.active = false;
		    }
		});

        // Prevent stuck input when switching tabs
        window.addEventListener("blur", () => {
            this.keysDown.clear();
            this.mouse.buttonsDown.clear();
            this.touches.clear();
            this.swipe.active = false;
        });
    }

    // Keyboard queries
    isKeyDown(code) {
        return this.keysDown.has(code);
    }

    isKeyPressed(code) {
        return this.keysPressed.has(code);
    }

    isKeyReleased(code) {
        return this.keysReleased.has(code);
    }

    // Mouse queries
    isMouseDown(button = 0) {
        return this.mouse.buttonsDown.has(button);
    }

    isMousePressed(button = 0) {
        return this.mouse.buttonsPressed.has(button);
    }

    isMouseReleased(button = 0) {
        return this.mouse.buttonsReleased.has(button);
    }

    getPointer() {
	    // Prefer touch if available
	    if (this.touches.size > 0) {
	        const first = this.touches.values().next().value;
	        return {
	            x: Math.round(first.x),
	            y: Math.round(first.y),
	            active: true,
	            type: "touch"
	        };
	    }

	    return {
	        x: this.mouse.x,
	        y: this.mouse.y,
	        active: this.mouse.buttonsDown.size > 0,
	        type: "mouse"
	    };
	}

    endFrame() {
	    // keyboard
	    this.keysPressed.clear();
	    this.keysReleased.clear();

	    // mouse
	    this.mouse.buttonsPressed.clear();
	    this.mouse.buttonsReleased.clear();

	    // touch
	    this.touchPressed.clear();
	    this.touchReleased.clear();
	}
}

    }

    loop(timestamp) {
        if (!this.lastTime) this.lastTime = timestamp;

        let frameTime = timestamp - this.lastTime;
        this.lastTime = timestamp;

        // Clamp huge frame jumps (tab freeze protection)
        if (frameTime > this.maxFrameTime) {
            frameTime = this.maxFrameTime;
        }

        this.accumulator += frameTime;

        // Fixed update loop
        while (this.accumulator >= this.fixedDelta) {
            this.update(this.fixedDelta / 1000);
            this.accumulator -= this.fixedDelta;
        }

        const alpha = this.accumulator / this.fixedDelta;
        this.render(alpha, timestamp, frameTime);

        this.input.endFrame();

        requestAnimationFrame(this.loop);
    }

    update(dt) {
    	this.currentUpdateFPS = 1 / dt;
        
        // if (this.input.isKeyDown("KeyW") || this.input.isKeyDown("ArrowUp")) this.player.d = 3;

			let lastLineI = this.linePoints.length - 1;

    			let dx = this.linePoints[lastLineI].raw[lastLinePointI].x - this.input.mouse.mx;
    			let dy = this.linePoints[lastLineI].raw[lastLinePointI].y - this.input.mouse.my;
    			let dh = Math.sqrt(dx * dx + dy * dy);

    			if (dh > 5) { // the distance before a new point is created
    				this.linePoints[lastLineI].raw.push(new Point(this.input.mouse.mx, this.input.mouse.my));
    			}
    		} else {
    			this.linePoints[lastLineI].raw.push(new Point(this.input.mouse.mx, this.input.mouse.my));
    		}
    	} else if (this.input.mouse.buttonsReleased.has(0) || this.input.touchReleased.size > 0) {
    		this.linePoints[this.linePoints.length-1].process(this.penBase);

    		this.linePoints.push(new Stroke());
    		this.path.push([]);

    		while (this.linePoints.length > 2) this.linePoints.splice(0,1); // keep only one Stroke
    		while (this.path.length > 2) this.path.splice(0,1);

    		// console.log(this.linePoints[0], this.area.ctx.width, this.area.ctx.height); // Get the stroke for setting the starting img
    	}
    }

    render(alpha, timestamp, frameTime) { // finalColor = color * alpha + background * (1 - alpha)
        const ctx = this.area.ctx;
        this.currentRenderFPS = 1000/frameTime;

        // Clear
        ctx.clearRect(0, 0, ctx.width, ctx.height);

        // Draw Line(s)
        ctx.fillStyle = "#D55";
        ctx.lineWidth = 5;
        for (let i = 0; i < this.linePoints.length; i++) {
        	// draw the delaunay triangulation
            ctx.strokeStyle = "#90909010";
        	ctx.lineWidth = 2;
            for (const seg of this.linePoints[i].triangleSegments) {
            	ctx.beginPath();
            	ctx.moveTo(seg.p1.x, seg.p1.y);
            	ctx.lineTo(seg.p2.x, seg.p2.y);
            	ctx.stroke();
            }

        	// Messing with FFT
	        if (this.linePoints[i].traced.length > 1) {
				let p = drawEpicycles(
		            mod(timestamp/1000 * (GLOBAL_SPEED_VARIABLE_FOR_FFT_EPICYCLES/this.linePoints[i].traced.length),1),
		            this.linePoints[i].used,
		            this.linePoints[i].mean,
		            ctx,
		            this.penBase
		        );
		        ctx.beginPath();ctx.arc(p.x, p.y, 5, 0, 2*Math.PI);ctx.fill();
		        this.path[i].push(p); // add to the fading path

		        this.path[i].splice(0,this.path[i].length - parseInt(this.linePoints[i].traced.length*0.2)); // make sure it stays short

		        // background path
				ctx.strokeStyle = "#CEFECE7F";
				ctx.lineWidth = 6;
			    ctx.beginPath();
			    for (let j = 0; j < this.linePoints[i].traced.length; j++) {
			    	let x = this.linePoints[i].traced[j].x;
			    	let y = this.linePoints[i].traced[j].y;
			        if (j === 0)
			            ctx.moveTo(x, y);
			        else
			            ctx.lineTo(
			                x,
			                y
			            );
			        // ctx.fillRect(x-5, y-5, 10, 10);
			    }
			    ctx.stroke();

			    // fading path
			    ctx.lineWidth = 8;
			    for (let j = 0; j < this.path[i].length-1; j++) {
			    	ctx.strokeStyle = "#CEFE" + rgbToHex(105 + 150*(j/(this.path[i].length-1)),0,0).slice(0,2).toUpperCase();
			    	ctx.beginPath();
			    	ctx.moveTo(this.path[i][parseInt(mod(j+0, this.path[i].length))].x, this.path[i][parseInt(mod(j+0, this.path[i].length))].y);

			    }

        	// draw the drawn lines
        	if (this.linePoints[i].traced.length <= 0) {
	        	ctx.strokeStyle = "#55D";
	        	ctx.lineWidth = 5;
	        	if (this.linePoints[i].resampled.length == 0) {
	        		drawCatmullRomBezier(ctx, this.linePoints[i].raw); // built-in bezier is faster than custom
	        	} else {
	        		drawCatmullRomBezier(ctx, this.linePoints[i].resampled);
	        	}
	        }
        }
    }
}


function startGame() {
	const game = new Game();
}

startGame();
